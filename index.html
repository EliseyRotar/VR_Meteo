<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Meteo – Previsioni Meteo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">⛅</span>
                <h1>VR Meteo</h1>
            </div>
            <p class="subtitle">Previsioni meteo in tempo reale per qualsiasi città</p>
        </div>
    </header>

    <main>

        <section class="search-section">
            <div class="search-box">
                <input
                    type="text"
                    id="city-input"
                    placeholder="Es. Roma, Milano, Napoli..."
                    autocomplete="off"
                    spellcheck="false"
                >
                <button id="search-btn">Cerca</button>
            </div>
            <div class="unit-toggle">
                <span>Unità di misura:</span>
                <button id="unit-c-btn" class="unit-active">°C</button>
                <span>/</span>
                <button id="unit-f-btn">°F</button>
            </div>
        </section>

        <div id="status-msg" class="status-msg nascosto" role="alert" aria-live="polite"></div>

        <section id="result-section" class="nascosto">
            <div id="current-weather"></div>
            <div id="forecast-section"></div>
        </section>

    </main>

    <footer>
        <p>Dati meteo forniti da <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo API</a> &middot; VR Meteo &ndash; Verde &amp; Rotar &ndash; TPS 2025/26</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
