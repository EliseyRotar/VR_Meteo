<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- sfondo scuro arrotondato -->
  <rect width="64" height="64" rx="14" fill="#0d1a0f"/>

  <!-- sole (arco superiore destro) -->
  <circle cx="40" cy="22" r="10" fill="#f0a030"/>
  <!-- raggi del sole -->
  <line x1="40" y1="8"  x2="40" y2="4"  stroke="#f0a030" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50.5" y1="11.5" x2="53.5" y2="8.5" stroke="#f0a030" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="22"  x2="58" y2="22"  stroke="#f0a030" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50.5" y1="32.5" x2="53.5" y2="35.5" stroke="#f0a030" stroke-width="2.5" stroke-linecap="round"/>

  <!-- nuvola verde in primo piano -->
  <circle cx="22" cy="36" r="10" fill="#142016"/>
  <circle cx="22" cy="36" r="10" fill="#6dba58"/>
  <circle cx="32" cy="34" r="9"  fill="#6dba58"/>
  <circle cx="40" cy="37" r="7"  fill="#6dba58"/>
  <rect x="15" y="38" width="32" height="10" rx="0" fill="#6dba58"/>

  <!-- gocce di pioggia -->
  <line x1="22" y1="51" x2="20" y2="58" stroke="#ede9e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="51" x2="29" y2="58" stroke="#ede9e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="51" x2="38" y2="58" stroke="#ede9e0" stroke-width="2" stroke-linecap="round"/>
</svg>
